modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"
#issueTrackerURL="https://change.me.to.your.issue.tracker.example.invalid/"
#clientSideOnly=false

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
#https://docs.minecraftforge.net/en/latest/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json"
#displayURL="https://change.me.to.your.mods.homepage.example.invalid/"
#logoFile="examplemod.png"
#credits=""
authors="${mod_authors}"
#displayTest="MATCH_VERSION"


description='''${mod_description}'''
[[dependencies.${mod_id}]]
    modId="forge"
    mandatory=true
    versionRange="${forge_version_range}"
    ordering="NONE"
    # Side this dependency is applied on - BOTH, CLIENT, or SERVER
    side="BOTH"
# Here's another dependency
[[dependencies.${mod_id}]]
    modId="minecraft"
    mandatory=true
    # This version range declares a minimum of the current minecraft version up to but not including the next major version
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="cucumber"
    mandatory = true
    type="required"
    versionRange="[${cucumber_version},)"
    ordering="NONE"
    side="BOTH"
[[dependencies.${mod_id}]]
    modId="mysticalagriculture"
    mandatory = true
    type="required"
    versionRange="[${mysticalagriculture_version},)"
    ordering="AFTER"
    side="BOTH"

#[features.${mod_id}]
    #openGLVersion="[3.2,)"
